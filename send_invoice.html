<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice Validator — Submit</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f3ee; --surface: #ffffff; --border: #e2ddd4;
    --text: #1a1814; --muted: #8a8478; --ink: #1a1814;
    --pass: #1a7a4a; --fail: #c0392b;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }
  body {
    font-family: var(--display); background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 40px; width: 100%; max-width: 420px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.06);
    display: flex; flex-direction: column; gap: 24px;
  }
  .card-header { display: flex; flex-direction: column; gap: 4px; }
  .card-title { font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
  .card-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
  hr { border: none; border-top: 1px solid var(--border); }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
  input[type="text"] {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 11px 14px; color: var(--ink);
    font-size: 12px; font-family: var(--mono); outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--ink); }
  .save-link {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    cursor: pointer; text-decoration: underline; align-self: flex-start;
  }
  .drop-zone {
    border: 1.5px dashed var(--border); border-radius: 8px;
    padding: 28px 20px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--ink); background: var(--bg); }
  .drop-zone input { display: none; }
  .drop-icon { font-size: 28px; opacity: 0.35; }
  .drop-text { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .drop-chosen { font-family: var(--mono); font-size: 11px; color: var(--ink); font-weight: 500; }
  button {
    background: var(--ink); color: var(--bg); border: none;
    border-radius: 6px; padding: 14px; font-size: 13px; font-weight: 700;
    font-family: var(--display); cursor: pointer; letter-spacing: 0.02em;
    transition: opacity 0.2s; width: 100%;
  }
  button:hover { opacity: 0.82; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  .status-box {
    display: none; padding: 12px 14px; border-radius: 6px;
    font-family: var(--mono); font-size: 11px; line-height: 1.6;
    border: 1px solid var(--border);
  }
  .status-box.info  { background: #f0ede6; color: var(--muted); }
  .status-box.ok    { background: #e8f5ee; color: var(--pass); border-color: #a8d9bc; }
  .status-box.error { background: #fdf0ee; color: var(--fail); border-color: #e8b4ae; }
  .progress-bar {
    height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; display: none;
  }
  .progress-fill {
    height: 100%; background: var(--ink); width: 0%;
    transition: width 0.4s ease; border-radius: 1px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="card-title">Invoice Validator</div>
    <div class="card-sub">Submit a PDF for validation</div>
  </div>

  <hr>

  <div class="field">
    <label>n8n Webhook URL</label>
    <input type="text" id="webhookUrl" placeholder="https://your-n8n.com/webhook/…" />
    <span class="save-link" onclick="saveUrl()">Save URL for next time</span>
  </div>

  <div class="field">
    <label>Invoice PDF</label>
    <div class="drop-zone" id="dropZone"
      onclick="document.getElementById('pdfFile').click()"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event)">
      <input type="file" id="pdfFile" accept=".pdf" onchange="fileChosen(this.files[0])">
      <div class="drop-icon">⬡</div>
      <div class="drop-text">Click to select or drag & drop a PDF</div>
      <div class="drop-chosen" id="chosen-name"></div>
    </div>
  </div>

  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <button id="submitBtn" onclick="submit()">Validate Invoice →</button>

  <div class="status-box" id="status-box"></div>
</div>

<script>
  // ── Restore saved URL ──────────────────────────────────────
  const saved = localStorage.getItem("n8n_webhook_url");
  if (saved) document.getElementById("webhookUrl").value = saved;

  let selectedFile = null;

  function saveUrl() {
    const url = document.getElementById("webhookUrl").value.trim();
    if (url) {
      localStorage.setItem("n8n_webhook_url", url);
      showStatus("Webhook URL saved.", "ok");
    }
  }

  function fileChosen(file) {
    if (!file) return;
    selectedFile = file;
    document.getElementById("chosen-name").textContent = file.name;
    document.querySelector(".drop-text").textContent = "File selected:";
  }

  // ── Drag and drop ──────────────────────────────────────────
  function onDragOver(e) {
    e.preventDefault();
    document.getElementById("dropZone").classList.add("drag-over");
  }
  function onDragLeave(e) {
    document.getElementById("dropZone").classList.remove("drag-over");
  }
  function onDrop(e) {
    e.preventDefault();
    document.getElementById("dropZone").classList.remove("drag-over");
    const file = e.dataTransfer.files[0];
    if (file && file.type === "application/pdf") {
      fileChosen(file);
    } else {
      showStatus("Please drop a PDF file.", "error");
    }
  }

  // ── Status helper ──────────────────────────────────────────
  function showStatus(msg, type) {
    const box = document.getElementById("status-box");
    box.textContent = msg;
    box.className = "status-box " + type;
    box.style.display = "block";
  }

  function setProgress(pct) {
    const bar = document.getElementById("progress-bar");
    const fill = document.getElementById("progress-fill");
    if (pct === null) { bar.style.display = "none"; return; }
    bar.style.display = "block";
    fill.style.width = pct + "%";
  }

  // ── Submit ─────────────────────────────────────────────────
  async function submit() {
    const url = document.getElementById("webhookUrl").value.trim();
    const btn = document.getElementById("submitBtn");

    if (!url)          return showStatus("Please enter your n8n webhook URL.", "error");
    if (!selectedFile) return showStatus("Please select a PDF file.", "error");

    btn.disabled = true;
    setProgress(20);
    showStatus("Uploading invoice to n8n…", "info");

    const formData = new FormData();
    formData.append("data", selectedFile, selectedFile.name);

try {
  const response = await fetch(url, {
    method: "POST",
    body: formData,
  });

  if (!response.ok) {
    const errText = await response.text().catch(() => "");
    throw new Error(`n8n returned HTTP ${response.status}${errText ? ": " + errText.slice(0,120) : ""}`);
  }

  const json = await response.json();
  const destination = json.redirectUrl?.trim();

  if (!destination) {
    throw new Error(
      "n8n returned an empty response.\n\n" +
      "Check that your Respond to Webhook node:\n" +
      "• Has 'Respond With' set to JSON\n" +
      "• Has Response Body set to {{ $json }} with the = toggle ON\n" +
      "• Response Code is 200"
    );
  }

  if (!destination.startsWith("http")) {
    throw new Error("Got unexpected response (not a URL):\n" + destination.slice(0, 200));
  }

  setProgress(100);
  showStatus("Success! Opening validation report…", "ok");
  setTimeout(() => { window.location.href = destination; }, 600);

} catch (err) {
  setProgress(null);
  showStatus("Error: " + err.message, "error");
  btn.disabled = false;
}
  }
</script>
</body>
</html>
