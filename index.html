<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Invoice Validator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    .left {
      flex: 1;
      border-right: 1px solid #ddd;
    }

    .right {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .box {
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #eee;
    }

    .pass {
      color: green;
      font-weight: bold;
    }

    .fail {
      color: red;
      font-weight: bold;
    }

    .header {
      font-size: 18px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="left">
  <iframe id="pdf"></iframe>
</div>

<div class="right">
  <div class="header">Validation Results</div>
  <div id="results">Loading...</div>
</div>

<script>
async function loadInvoice() {

  // get invoice id from URL
  const params = new URLSearchParams(window.location.search);
  const invoiceId = params.get("id") || "INV-1002";

  const url = `YOUR_N8N_WEBHOOK_URL?id=${invoiceId}`;

  const res = await fetch(url);
  const data = await res.json();

  // PDF
  document.getElementById("pdf").src = data.pdf_url;

  // Validation
  const container = document.getElementById("results");
  container.innerHTML = "";

  data.validation.forEach(v => {
    const div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
      <span class="${v.status === "PASS" ? "pass" : "fail"}">
        ${v.status}
      </span>
      — ${v.field}
    `;

    container.appendChild(div);
  });
}

loadInvoice();
</script>

</body>
</html>
